# Viditelnost
hologram-shown: '{prefix}<green>Hologram <aqua>{name}</aqua> je nyní zobrazen hráči <aqua>{player}</aqua>.'
hologram-hidden: '{prefix}<green>Hologram <aqua>{name}</aqua> je nyní skryt před hráčem <aqua>{player}</aqua>.'

# Konfigurace / reload
